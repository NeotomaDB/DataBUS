# ── Analysis Units ────────────────────────────────────────────────────────────
- column: Depth
  neotoma: ndb.analysisunits.depth
  required: false
  overwrite: true
  rowwise: true
  type: float

- column: Thickness
  neotoma: ndb.analysisunits.thickness
  required: false
  overwrite: true
  rowwise: true
  type: float

- column: AnalysisUnitName
  neotoma: ndb.analysisunits.analysisunitname
  required: false
  rowwise: true
