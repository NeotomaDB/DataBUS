  required: false
  rowwise: false
  type: float

- column: SiteArea
  neotoma: ndb.sites.area
  required: false
  rowwise: false
  type: float

- column: SiteDescription
  neotoma: ndb.sites.sitedescription
  required: false
  rowwise: false
  type: string

- column: SiteNotes
  neotoma: ndb.sites.notes
  required: false
  rowwise: false
  type: string

